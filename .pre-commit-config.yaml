# pre-commit 설정
# 사용법:
#   pip install pre-commit
#   pre-commit install
# 이후 git commit 시 자동 실행
#
# 수동 실행:
#   pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2000"]
      - id: detect-private-key

  # PROJECT_GUIDE.md → guide.html 자동 동기화
  - repo: local
    hooks:
      - id: protect-protected-branch
        name: block direct commits on main/develop
        entry: python scripts/git-hooks/guard_protected_branch.py --mode commit
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]
      - id: protect-protected-branch-push
        name: block direct pushes to main/develop
        entry: python scripts/git-hooks/guard_protected_branch.py --mode pre-push
        language: system
        pass_filenames: false
        always_run: true
        stages: [push]
      - id: conventional-commit-message
        name: validate Conventional Commits message
        entry: python scripts/git-hooks/validate_commit_msg.py
        language: system
        stages: [commit-msg]
      - id: sync-guide
        name: sync guide.html with PROJECT_GUIDE.md
        entry: python scripts/sync_guide.py
        language: system
        files: '^(PROJECT_GUIDE\.md|guide\.html|scripts/sync_guide\.py)$'
        pass_filenames: false
        # 동기화로 guide.html이 바뀌면 그 변경분도 자동 stage
        stages: [commit]

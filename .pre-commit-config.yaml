# =============================================================================
# Pre-commit hooks configuration
# 설치: pip install pre-commit && pre-commit install
# 실행: pre-commit run --all-files (전체 검사)
# =============================================================================

repos:
  # ---------------------------------------------------------------------------
  # 일반 파일 검증
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace            # 줄 끝 공백 제거
        exclude: \.md$                      # Markdown 줄바꿈 보존
      - id: end-of-file-fixer               # 파일 끝 개행
      - id: check-yaml                      # YAML 문법 검증
      - id: check-toml                      # TOML 문법 검증
      - id: check-json                      # JSON 문법 검증
      - id: check-added-large-files         # 큰 파일 커밋 방지
        args: ['--maxkb=5000']              # 5MB 초과 차단
      - id: check-merge-conflict            # 머지 충돌 마커 검출
      - id: detect-private-key              # 개인 키 검출
      - id: mixed-line-ending               # 줄바꿈 통일
        args: ['--fix=lf']

  # ---------------------------------------------------------------------------
  # Python: Black (포매터)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        files: ^backend/.*\.py$
        args: ['--line-length=100']

  # ---------------------------------------------------------------------------
  # Python: Ruff (린터 + import 정렬)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        files: ^backend/.*\.py$
        args: ['--fix']
      - id: ruff-format
        files: ^backend/.*\.py$

  # ---------------------------------------------------------------------------
  # Python: mypy (타입 체크)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^backend/(supplement_analysis|food_image_analysis|ai_agent_chat)/src/.*\.py$
        args: ['--ignore-missing-imports']
        additional_dependencies:
          - pydantic
          - types-requests

  # ---------------------------------------------------------------------------
  # Markdown: 마크다운 문법 검증
  # ---------------------------------------------------------------------------
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.40.0
    hooks:
      - id: markdownlint
        args: ['--config', '.markdownlint.json']

  # ---------------------------------------------------------------------------
  # 보안: 비밀 정보 검출
  # ---------------------------------------------------------------------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: ^(\.git/|\.venv/|node_modules/)

  # ---------------------------------------------------------------------------
  # 커밋 메시지 컨벤션 검증 (Conventional Commits)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - chore
          - ci

# Flutter/Dart는 별도 pre-commit 통합이 어려우므로
# IDE 저장 시 자동 포매팅 + CI에서 검증하는 방식 권장

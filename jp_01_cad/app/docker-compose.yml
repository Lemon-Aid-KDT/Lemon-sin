# ============================================================
#  CAD Vision v4.0 — Docker Compose
#  app (Streamlit + FastAPI + ML) + ollama (LLM 서버)
# ============================================================
#
#  사용법:
#    ./docker-start.sh          # 빌드 + 시작 (권장)
#    ./docker-start.sh --build  # 강제 재빌드
#    ./docker-start.sh --down   # 중지
#
#  ⚠️ 주의: 프로젝트가 공백이 포함된 경로에 있으므로
#    bind mount 대신 named volume을 사용합니다.
#

services:
  # ── Streamlit + FastAPI 앱 ──────────────────────────────
  app:
    build: .
    container_name: cad-vision-app
    ports:
      - "8501:8501"
      - "8000:8000"
    volumes:
      - cad-vision-data:/app/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen3.5:9b
      - OLLAMA_TIMEOUT=300
      - CHROMA_PERSIST_DIR=/app/data/vector_store
      - UPLOAD_DIR=/app/data/sample_drawings
      - YOLO_CLS_MODEL_PATH=/app/models/yolo_cls_v2_best.pt
      - YOLO_DET_MODEL_PATH=/app/models/yolo_det_best.pt
      - GNN_MODEL_PATH=/app/models/gnn_encoder.pt
      - GNN_ENABLED=true
      - GNN_WEIGHT=0.3
      - IMAGE_WEIGHT=0.1
      - TEXT_WEIGHT=0.6
      - SQLITE_DB_PATH=/app/data/vector_store/records.db
      - RERANKER_ENABLED=true
      - DRAWING_PATH_REMAP_FROM=/Volumes/Corsair EX300U Media/00_work_out/01_complete/me/01_CAD/data
      - DRAWING_PATH_REMAP_TO=/app/data/external_drawings
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped

  # ── Ollama LLM 서버 ────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cad-vision-ollama
    ports:
      - "127.0.0.1:11434:11434"  # 보안: localhost만 노출
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  cad-vision-data:
    name: cad-vision-data
  ollama_data:
    name: cad-vision-ollama-data

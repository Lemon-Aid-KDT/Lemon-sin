name: Sync guide.html with PROJECT_GUIDE.md

# main 또는 dev에 PROJECT_GUIDE.md / guide.html / 동기화 스크립트가 푸시되면
# 자동으로 guide.html을 PROJECT_GUIDE.md와 일치시키고 변경분을 추가 커밋한다.
# PR에서는 검증만 수행하여 동기화가 안 됐으면 CI 실패시킨다.

on:
  push:
    branches: [main, dev]
    paths:
      - "PROJECT_GUIDE.md"
      - "guide.html"
      - "scripts/sync_guide.py"
      - ".github/workflows/sync-guide.yml"
  pull_request:
    paths:
      - "PROJECT_GUIDE.md"
      - "guide.html"
      - "scripts/sync_guide.py"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 자동 커밋이 다음 워크플로를 또 트리거하지 않도록 token 분리
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: PR — 동기화 검증만
        if: github.event_name == 'pull_request'
        run: |
          python scripts/sync_guide.py --check

      - name: Push — 자동 동기화 + 커밋
        if: github.event_name == 'push'
        run: |
          python scripts/sync_guide.py

          if [[ -n "$(git status --porcelain guide.html)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add guide.html
            git commit -m "chore(docs): sync guide.html with PROJECT_GUIDE.md [skip ci]"
            git push
            echo "✓ guide.html 자동 동기화 커밋 푸시 완료"
          else
            echo "✓ 이미 동기화 상태"
          fi

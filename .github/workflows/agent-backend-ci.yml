name: Agent Backend CI

on:
  workflow_dispatch:
    inputs:
      run_sglang_smoke:
        description: "Run opt-in live SGLang merge smoke against the configured endpoint."
        required: false
        default: false
        type: boolean
      sglang_endpoint:
        description: "OpenAI-compatible SGLang endpoint reachable from the runner."
        required: false
        default: "http://127.0.0.1:30000/v1"
        type: string
      sglang_model:
        description: "SGLang model name served by the endpoint."
        required: false
        default: "Qwen/Qwen2.5-0.5B-Instruct"
        type: string
  pull_request:
    branches: [develop, main]
    paths:
      - "backend/**"
      - ".github/workflows/agent-backend-ci.yml"
  push:
    branches:
      - "feat/**"
      - "fix/**"
      - "test/**"
      - "ci/**"
      - "refactor/**"
    paths:
      - "backend/**"
      - ".github/workflows/agent-backend-ci.yml"

permissions:
  contents: read

concurrency:
  group: agent-backend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: backend

jobs:
  agent-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run agent package tests
        run: python -X utf8 -m pytest -q --no-cov ai_agent_chat/tests

      - name: Run chatbot route contract tests
        run: python -X utf8 -m pytest -q --no-cov Nutrition-backend/tests/integration/api/test_ai_agent_api.py

      - name: Run merge smoke and unknown backlog unit tests
        run: |
          python -X utf8 -m pytest -q --no-cov \
            Nutrition-backend/tests/unit/scripts/test_run_agent_llm_merge_smoke.py \
            Nutrition-backend/tests/unit/scripts/test_report_chatbot_unknown_backlog.py \
            Nutrition-backend/tests/unit/services/test_chatbot_unknown_backlog_report.py

      - name: Run no-LLM merge response smoke
        run: python -X utf8 scripts/run_agent_llm_merge_smoke.py --llm none

      - name: Run medical wiki chatbot dry-run eval
        run: |
          if [ -f ../MEDICAL-WIKI/manifest/reviewed_claims.jsonl ]; then
            python -X utf8 scripts/eval_medical_wiki_chatbot.py --as-of 2026-06-10 --dry-run
          else
            echo "Skipping medical wiki chatbot eval: ../MEDICAL-WIKI/manifest/reviewed_claims.jsonl is not present on this runner."
          fi

      - name: Run medical wiki evidence bundle dry-run eval
        run: |
          if [ -f ../MEDICAL-WIKI/manifest/evidence_bundle_adapter_fixtures.jsonl ]; then
            python -X utf8 scripts/eval_medical_wiki_evidence_bundles.py --as-of 2026-06-10 --dry-run
          else
            echo "Skipping medical wiki evidence bundle eval: ../MEDICAL-WIKI/manifest/evidence_bundle_adapter_fixtures.jsonl is not present on this runner."
          fi

      - name: Run ruff
        run: |
          python -m ruff check \
            ai_agent_chat/src \
            ai_agent_chat/tests \
            scripts \
            Nutrition-backend/src/services/chatbot_unknown_backlog_report.py \
            Nutrition-backend/src/services/user_health_context_snapshot.py \
            Nutrition-backend/tests/unit/scripts/test_run_agent_llm_merge_smoke.py \
            Nutrition-backend/tests/unit/scripts/test_report_chatbot_unknown_backlog.py \
            Nutrition-backend/tests/unit/services/test_chatbot_unknown_backlog_report.py \
            Nutrition-backend/tests/integration/api/test_ai_agent_api.py

      - name: Compile agent backend modules
        run: |
          python -m compileall \
            ai_agent_chat/src \
            scripts \
            Nutrition-backend/src/services/chatbot_unknown_backlog_report.py \
            Nutrition-backend/src/services/user_health_context_snapshot.py \
            Nutrition-backend/src/api/v1/ai_agent.py

      - name: Run opt-in live SGLang merge smoke
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_sglang_smoke }}
        env:
          RUN_SGLANG_SMOKE: "1"
          SGLANG_BASE_URL: ${{ inputs.sglang_endpoint }}
          SGLANG_MODEL: ${{ inputs.sglang_model }}
        run: |
          python -X utf8 scripts/check_ai_agent_runtime_prereqs.py --ignore-env-file --require-sglang-smoke
          python -X utf8 scripts/run_agent_llm_merge_smoke.py \
            --llm sglang \
            --endpoint "${{ inputs.sglang_endpoint }}" \
            --model "${{ inputs.sglang_model }}" \
            --timeout 90 \
            --require-answerable-llm

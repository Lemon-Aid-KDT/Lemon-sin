name: Agent Backend CI

on:
  pull_request:
    branches: [develop, main]
    paths:
      - "backend/**"
      - ".github/workflows/agent-backend-ci.yml"
  push:
    branches:
      - "feat/**"
      - "fix/**"
      - "test/**"
      - "ci/**"
      - "refactor/**"
    paths:
      - "backend/**"
      - ".github/workflows/agent-backend-ci.yml"

permissions:
  contents: read

concurrency:
  group: agent-backend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: backend

jobs:
  agent-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run agent package tests
        run: python -X utf8 -m pytest -q --no-cov ai_agent_chat/tests

      - name: Run chatbot route contract tests
        run: python -X utf8 -m pytest -q --no-cov Nutrition-backend/tests/integration/api/test_ai_agent_api.py

      - name: Run medical wiki chatbot dry-run eval
        run: python -X utf8 scripts/eval_medical_wiki_chatbot.py --as-of 2026-06-10 --dry-run

      - name: Run medical wiki evidence bundle dry-run eval
        run: python -X utf8 scripts/eval_medical_wiki_evidence_bundles.py --as-of 2026-06-10 --dry-run

      - name: Run ruff
        run: |
          python -m ruff check \
            ai_agent_chat/src \
            ai_agent_chat/tests \
            scripts \
            Nutrition-backend/src/services/user_health_context_snapshot.py \
            Nutrition-backend/tests/integration/api/test_ai_agent_api.py

      - name: Compile agent backend modules
        run: |
          python -m compileall \
            ai_agent_chat/src \
            scripts \
            Nutrition-backend/src/services/user_health_context_snapshot.py \
            Nutrition-backend/src/api/v1/ai_agent.py

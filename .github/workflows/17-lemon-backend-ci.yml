name: Lemon Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - "yeong-Vision-Nutrition/backend/**"
      - "yeong-Vision-Nutrition/data/kdris/**"
      - ".github/workflows/17-lemon-backend-ci.yml"
  push:
    branches: [main, yeong-tech]
    paths:
      - "yeong-Vision-Nutrition/backend/**"
      - "yeong-Vision-Nutrition/data/kdris/**"
      - ".github/workflows/17-lemon-backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash
    working-directory: yeong-Vision-Nutrition/backend

jobs:
  backend-quality:
    name: Backend quality - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            yeong-Vision-Nutrition/backend/requirements.txt
            yeong-Vision-Nutrition/backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Black
        run: black src tests alembic --check

      - name: Ruff
        run: ruff check src tests alembic

      - name: Ruff security rules
        run: ruff check src alembic --select S

      - name: Mypy
        run: mypy src tests --strict

      - name: Dependency audit
        run: pip-audit -r requirements.txt

      - name: Pytest
        run: pytest

      - name: Alembic history
        run: alembic history

      - name: Alembic offline SQL
        run: alembic upgrade head --sql

  backend-db-smoke:
    name: Backend DB smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lemon_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/lemon_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/lemon_test
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            yeong-Vision-Nutrition/backend/requirements.txt
            yeong-Vision-Nutrition/backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Apply migrations
        run: alembic upgrade head

      - name: Check migration drift
        run: alembic check

      - name: Run database smoke test
        run: pytest tests/integration/db/test_db_session.py --no-cov

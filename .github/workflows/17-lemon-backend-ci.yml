name: Lemon Backend CI

on:
  pull_request:
    branches: [main, develop, yeong-tech]
  push:
    branches: [main, develop, yeong-tech]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash
    working-directory: 03_lemon_healthcare/Lemon-Aid/backend

env:
  PYTHONPATH: Nutrition-backend:food_image_analysis/src:ai_agent_chat/src
  CI_DATABASE_USER: postgres
  CI_DATABASE_PASSWORD: postgres
  CI_DATABASE_NAME: lemon_ci

jobs:
  backend-quality:
    name: Backend quality and integration
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lemon_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            03_lemon_healthcare/Lemon-Aid/backend/requirements.txt
            03_lemon_healthcare/Lemon-Aid/backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Lemon policy and privacy gates
        working-directory: 03_lemon_healthcare/Lemon-Aid
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          python backend/scripts/check_team_policy_assets.py --repo-root .
          python backend/scripts/check_lemon_ci_paths.py --project-root .
          python backend/scripts/audit_detect_secrets_baseline.py \
            --repo-root . \
            --fail-on-manual-review
          python backend/scripts/check_ocr_artifact_privacy.py \
            --check-tracked-generated \
            --project-root .
          python - <<'PY'
          import subprocess

          files = [
              path
              for path in subprocess.check_output(["git", "ls-files"], text=True).splitlines()
              if path != ".secrets.baseline"
          ]
          subprocess.run(
              ["detect-secrets-hook", "--baseline", ".secrets.baseline", *files],
              check=True,
          )
          PY
          if [ "$EVENT_NAME" = "pull_request" ]; then
            TITLE="${PR_TITLE:-$HEAD_COMMIT_MESSAGE}"
            BRANCH="${HEAD_REF:-$REF_NAME}"
            BASE="${BASE_REF:-$REF_NAME}"
            python scripts/git-hooks/validate_team_policy.py \
              --event-name "$EVENT_NAME" \
              --base "$BASE" \
              --branch "$BRANCH" \
              --title "$TITLE"
          fi

      - name: Export CI database URLs
        run: |
          DB_AUTH="${CI_DATABASE_USER}:${CI_DATABASE_PASSWORD}"
          DB_URL="postgresql+asyncpg://${DB_AUTH}@localhost:5432/${CI_DATABASE_NAME}"
          {
            echo "DATABASE_URL=${DB_URL}"
            echo "TEST_DATABASE_URL=${DB_URL}"
          } >> "$GITHUB_ENV"

      - name: Check formatting
        run: |
          black Nutrition-backend/src Nutrition-backend/tests food_image_analysis ai_agent_chat alembic scripts --check

      - name: Run lint
        run: |
          ruff check Nutrition-backend/src Nutrition-backend/tests food_image_analysis ai_agent_chat alembic scripts

      - name: Run type checks
        run: |
          mypy Nutrition-backend/src Nutrition-backend/tests food_image_analysis/src food_image_analysis/tests ai_agent_chat/src ai_agent_chat/tests --strict

      - name: Audit Python dependencies
        run: |
          python -m pip_audit -r requirements.txt

      - name: Validate service configuration JSON
        working-directory: 03_lemon_healthcare/Lemon-Aid
        run: |
          python -m json.tool config/service-segmentation.settings.json >/dev/null
          python -m json.tool config/implementation-readiness.settings.json >/dev/null

      - name: Validate KDRIs reference data
        run: |
          python scripts/validate_kdris_dataset.py --require-approved

      - name: Run OpenAPI contract smoke
        run: |
          python -m pytest \
            Nutrition-backend/tests/integration/api/test_p1_api_contract.py \
            Nutrition-backend/tests/integration/api/test_openapi_examples.py \
            -q --no-cov

      - name: Run database migrations
        run: |
          alembic upgrade head
          alembic current

      - name: Run live PostgreSQL smoke
        run: |
          python -m pytest Nutrition-backend/tests/integration/db/test_db_session.py -q --no-cov

      - name: Run tests
        run: |
          python -m pytest -q --no-cov

name: lemon_aid
description: AI 헬스케어 / 건강관리 플랫폼 — 만성질환자용 AI 영양·복약 관리 Agent
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # 상태 관리
  # 2026-05-18: v3 에서 StateNotifier deprecated/제거 → auth_provider 가 깨짐.
  # 코드 1곳만 StateNotifier 사용 중 → v2.5.x 로 핀.
  # riverpod_annotation/generator 는 코드에서 미사용 → 제거.
  flutter_riverpod: 2.5.1

  # 라우팅
  go_router: ^17.2.3

  # SVG (카카오·구글 등 브랜드 로고)
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2          # Splash 골드 캐릭터 로딩 애니메이션

  # HTTP 통신
  dio: ^5.4.3
  # retrofit 제거 (2026-05-18): 코드에서 사용 0건 확인. Dio 직접 호출로 충분.
  # 이전: retrofit ^4.1.0 + retrofit_generator ^9.1.0
  # 빌드 에러 사유: Parser.DartMappable enum 신규 추가로 generator 호환성 깨짐

  # 토큰 보안 저장 (access / refresh JWT)
  flutter_secure_storage: ^10.2.0

  # OAuth 로그인
  # 카카오: Native App Key 는 dart-define 으로 빌드 시 주입.
  #   flutter run --dart-define=KAKAO_NATIVE_APP_KEY=xxxx
  kakao_flutter_sdk_user: ^2.0.0+1
  # 구글: Client ID 는 google-services.json (Android) / GoogleService-Info.plist (iOS)
  #   또는 dart-define=GOOGLE_SERVER_CLIENT_ID=xxxx 로 주입.
  # 2026-05-18: v7+ 는 GoogleSignIn() 생성자 제거 + singleton 패턴으로 breaking change.
  # oauth_service.dart 가 v6 API (signIn / authentication) 사용 중이라 v6.2.x 로 핀.
  # 추후 v7 마이그레이션 별도 작업으로.
  google_sign_in: 6.2.2

  # 카메라·갤러리
  image_picker: ^1.1.2
  camera: ^0.12.0+1

  # 헬스 데이터 (iOS HealthKit + Android Health Connect)
  health: ^13.3.1

  # 로컬 DB (Drift = SQLite 기반, Isar 대체)
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # 차트
  fl_chart: ^1.2.0

  # 로컬 알림
  flutter_local_notifications: ^21.0.0

  # 시스템 캘린더
  add_2_calendar: ^3.0.1

  # 데이터 클래스
  # 2026-05-18: freezed 는 코드에서 미사용 (chat_message 주석) → 제거.
  # 향후 사용 시 재추가.
  json_annotation: ^4.9.0

  # 유틸
  # 2026-05-18: flutter_localizations 가 intl 0.20.2 요구 → 버전 올림
  intl: ^0.20.0

  # 한국어 로케일 (Material datepicker / showTimePicker 등)
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 코드 생성
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  # 2026-05-18: freezed / riverpod_generator / retrofit_generator 모두 코드에서 미사용 → 제거.
  drift_dev: ^2.20.0

  # 앱 아이콘 자동 생성
  flutter_launcher_icons: ^0.14.4

  # 네이티브 splash 제거 (사용자 결정 2026-05-11):
  # Flutter Splash 화면이 유일한 splash. flutter_native_splash 의존성 제거.

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/illustrations/
    - assets/animations/
    # Lemon Aid Design System (§13 LADS) — 2026-05-18 추가
    - assets/mascot/
    - assets/mascot/frames/
    - assets/mascot/gold-frames/
    - assets/mascot/tablet-frames/
    - assets/design_system/

  # 폰트 패밀리 (다이어리 §4.5a)
  # 현재 Pretendard만 활성. Gmarket Sans / Plus Jakarta Sans 는
  # assets/fonts/ 에 파일 추가 후 아래 주석 해제.
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
        - asset: assets/fonts/Pretendard-ExtraBold.otf
          weight: 800

    - family: GmarketSans
      fonts:
        - asset: assets/fonts/GmarketSansLight.ttf
          weight: 300
        - asset: assets/fonts/GmarketSansMedium.ttf
          weight: 500
        - asset: assets/fonts/GmarketSansBold.ttf
          weight: 700

    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-VariableFont_wght.ttf

    # AtoZ Display — Lemon Aid Design System (§13 LADS), 2026-05-18 추가
    # 워드마크, hero numbers, 섹션 헤더 ≥34px 전용
    # ⚠️ Thin/ExtraBold/Black 3 weights 만 제공. 400/500/600 은 Pretendard fallback
    - family: AtoZ
      fonts:
        - asset: assets/fonts/AtoZ-1Thin.ttf
          weight: 100
        - asset: assets/fonts/AtoZ-8ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/AtoZ-9Black.ttf
          weight: 900

flutter_icons:
  android: true
  ios: false  # iOS Xcode 프로젝트 미생성 (Windows 환경) — macOS에서 ios:true 로 재실행
  image_path: "assets/app_icon/app_icon.png"
  # 어댑티브 아이콘 — 시스템(런처)이 라운드 사각/원형/스쿼클 마스크 자동 적용
  # background: 흰색 (캐릭터 시안의 라운드 사각 배경과 동일)
  # foreground: 캐릭터 그대로 (라운드 사각 그림자는 포함)
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_icon/app_icon.png"
  min_sdk_android: 26
  remove_alpha_ios: true

# flutter_native_splash 설정 제거 — Flutter Splash 화면이 유일한 splash
# 네이티브 단계는 Android OS 기본 (검은/흰 화면 0.3~0.5초) 만 — 우리 제어 X
# 그 직후 바로 Flutter Splash (splash_screen.dart, 2초) 가 떠서 사용자 시각 splash 하나

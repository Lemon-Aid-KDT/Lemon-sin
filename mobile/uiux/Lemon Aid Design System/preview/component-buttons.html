<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="preview-base.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { display: grid; gap: 14px; }
  .row-btn { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .btn {
    --bg: var(--lemon-400);
    --fg: var(--ink-900);
    border: none; cursor: pointer; font: 600 15px/1 var(--font-body);
    padding: 12px 18px; border-radius: 14px;
    background: var(--bg); color: var(--fg);
    box-shadow: var(--shadow-2);
    display: inline-flex; align-items: center; gap: 8px;
    transition: transform 240ms cubic-bezier(0.32,0.72,0,1);
  }
  .btn:active { transform: scale(0.97); }
  .btn.primary { box-shadow: var(--shadow-lemon); }
  .btn.secondary { --bg: var(--paper); --fg: var(--ink-900);
                   border: 1px solid var(--ink-200); box-shadow: var(--shadow-1); }
  .btn.success { --bg: var(--leaf-600); --fg: #fff; }
  .btn.ghost { --bg: transparent; --fg: var(--ink-700); box-shadow: none; }
  .btn.icon-only { padding: 12px; }
  .btn.large { padding: 16px 22px; font-size: 16px; border-radius: 16px; }
  .btn.small { padding: 8px 12px; font-size: 13px; border-radius: 12px; }
  .btn.disabled { opacity: 0.4; cursor: not-allowed; }
  [data-lucide] { width: 18px; height: 18px; stroke-width: 1.9; }
  .label { font: var(--t-label); color: var(--ink-500); }
</style></head>
<body class="preview compact" style="height: 280px;">
  <div class="lbl" style="color: var(--ink-700);">Primary CTA · the warm lemon halo identifies the main action.</div>
  <div class="row-btn">
    <button class="btn primary"><i data-lucide="camera"></i>사진으로 분석하기</button>
    <button class="btn primary large"><i data-lucide="sparkles"></i>오늘 한 줄 받기</button>
    <button class="btn primary small">저장</button>
    <button class="btn icon-only primary" aria-label="capture"><i data-lucide="camera"></i></button>
  </div>
  <div class="lbl" style="color: var(--ink-700);">Secondary, success and ghost — never multiple lemon CTAs on one screen.</div>
  <div class="row-btn">
    <button class="btn secondary"><i data-lucide="image"></i>갤러리에서 선택</button>
    <button class="btn success"><i data-lucide="check"></i>확인 후 저장</button>
    <button class="btn ghost"><i data-lucide="arrow-left"></i>뒤로</button>
    <button class="btn primary disabled"><i data-lucide="camera"></i>분석 중…</button>
  </div>
  <div class="lbl" style="color: var(--ink-700);">States — at rest · pressed (scale 0.97) · disabled (40 % alpha).</div>
  <div class="row-btn">
    <button class="btn primary">기본</button>
    <button class="btn primary" style="transform: scale(0.97);">눌림</button>
    <button class="btn primary disabled">비활성</button>
    <span class="label">240 ms · cubic-bezier(0.32,0.72,0,1)</span>
  </div>
  <script>lucide.createIcons();</script>
</body></html>

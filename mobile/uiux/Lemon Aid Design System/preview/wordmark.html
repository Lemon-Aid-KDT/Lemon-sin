<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="preview-base.css">
<style>
  body { display: flex; align-items: center; gap: 28px;
         background: linear-gradient(135deg, #FFFCE6, #FFF8C7 60%, #FFEAB0); }
  .mark { font: 900 84px/0.95 var(--font-display);
          letter-spacing: -0.04em; }
  .mark .lemon { color: var(--lemon-500);
                 text-shadow: 0 2px 0 rgba(255,255,255,0.6); }
  .mark .dash  { color: var(--ink-300); margin: 0 4px; }
  .mark .aid   { color: var(--leaf-500); }
  .blurb { color: var(--ink-700); font: var(--t-body); max-width: 280px; }
  .blurb b { color: var(--ink-900); }
  img.leaf { width: 64px; height: 64px; transform: translateY(-22px) rotate(8deg); }
</style></head>
<body class="preview" style="height: 220px;">
  <div class="col" style="gap: 8px;">
    <div class="mark">
      <span class="lemon">Lemon</span><span class="dash">-</span><span class="aid">Aid</span>
    </div>
    <div class="blurb">도움이 되는, <b>당신의 레몬에이드</b>.</div>
  </div>
  <div style="margin-left: auto;">
    <img src="../assets/mascot/tablet-frames/03-leaf-complete.png" style="height: 200px; transform: translateX(20px); filter: drop-shadow(0 14px 18px rgba(214,158,0,0.30));">
  </div>
</body></html>

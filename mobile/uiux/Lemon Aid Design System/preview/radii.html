<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="preview-base.css">
<style>
  body { display: grid; gap: 12px; }
  .rows { display: grid; grid-template-columns: auto 1fr auto; gap: 8px 16px; align-items: center; }
  .pill { background: var(--lemon-100); border-radius: var(--r-pill);
          padding: 6px 14px; font: var(--t-label); color: var(--lemon-600); }
  .square { background: var(--paper); border: 1px solid var(--ink-100); }
  .row-radii { display: flex; align-items: flex-end; gap: 18px; }
  .demo { background: linear-gradient(180deg, var(--lemon-300), var(--lemon-500));
          box-shadow: var(--shadow-2);
          color: var(--ink-900);
          width: 70px; height: 70px;
          display: flex; align-items: center; justify-content: center;
          font: var(--t-caption); }
  .row-radii .meta { font: var(--t-label); color: var(--ink-500); display: block;
                     margin-top: 6px; text-align: center; }
</style></head>
<body class="preview compact" style="height: 220px;">
  <div class="spread">
    <div class="lbl" style="color: var(--ink-700);">Corner radii · the brand is round, so the system is, too.</div>
    <span class="tok">--r-xs → --r-pill</span>
  </div>
  <div class="row-radii">
    <div><div class="demo" style="border-radius: var(--r-xs);">6</div><span class="meta">r-xs · tags, code</span></div>
    <div><div class="demo" style="border-radius: var(--r-sm);">10</div><span class="meta">r-sm · inputs</span></div>
    <div><div class="demo" style="border-radius: var(--r-md);">14</div><span class="meta">r-md · chips</span></div>
    <div><div class="demo" style="border-radius: var(--r-lg);">20</div><span class="meta">r-lg · cards</span></div>
    <div><div class="demo" style="border-radius: var(--r-xl);">28</div><span class="meta">r-xl · tab bar</span></div>
    <div><div class="demo" style="border-radius: var(--r-2xl);">36</div><span class="meta">r-2xl · sheets</span></div>
    <div><div class="demo" style="border-radius: var(--r-pill); width: 110px;">pill</div><span class="meta">r-pill · capsules</span></div>
  </div>
</body></html>

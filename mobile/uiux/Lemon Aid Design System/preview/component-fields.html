<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="preview-base.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { display: grid; gap: 14px; }
  .field { display: grid; gap: 4px; }
  .field .lbl { font: var(--t-label); color: var(--ink-700); }
  .input {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    border: 1px solid var(--ink-200);
    border-radius: 14px;
    background: var(--paper);
    color: var(--ink-900);
    font: var(--t-body);
  }
  .input .ph { color: var(--ink-300); flex: 1; }
  .input .val { flex: 1; color: var(--ink-900); }
  .input.focus { border-color: var(--lemon-400); box-shadow: 0 0 0 4px rgba(255,206,0,0.18); }
  .input.error { border-color: var(--danger); box-shadow: 0 0 0 4px var(--danger-soft); }
  .input.disabled { background: var(--canvas); color: var(--ink-300); }
  .hint { font: var(--t-body-sm); color: var(--ink-500); }
  .hint.err { color: var(--danger); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    padding: 8px 12px; border-radius: 999px;
    border: 1px solid var(--ink-200);
    background: var(--paper); font: var(--t-label); color: var(--ink-700);
    display: inline-flex; gap: 6px; align-items: center;
  }
  .chip.active { background: var(--lemon-100); border-color: var(--lemon-300); color: var(--lemon-600); }
  [data-lucide] { width: 18px; height: 18px; stroke-width: 1.9; color: var(--ink-500); }
  .chip.active [data-lucide] { color: var(--lemon-600); }
</style></head>
<body class="preview compact" style="height: 320px;">
  <div class="row2">
    <div class="field">
      <span class="lbl">제품명</span>
      <div class="input focus">
        <i data-lucide="pill"></i>
        <span class="val">멀티비타민 365</span>
      </div>
      <span class="hint">라벨에서 자동 입력됨 · 직접 수정 가능</span>
    </div>
    <div class="field">
      <span class="lbl">하루 섭취 횟수</span>
      <div class="input">
        <span class="val">2</span>
        <span class="muted">회</span>
      </div>
      <span class="hint">정수만 입력하세요.</span>
    </div>
  </div>
  <div class="row2">
    <div class="field">
      <span class="lbl">함량 단위</span>
      <div class="input error">
        <span class="ph">단위를 선택하세요</span>
        <i data-lucide="chevron-down"></i>
      </div>
      <span class="hint err">단위가 비어 있어요. mg · IU · mcg 중 하나를 선택해 주세요.</span>
    </div>
    <div class="field">
      <span class="lbl">OCR 원문</span>
      <div class="input disabled">
        <span class="val">자동 추출 중…</span>
      </div>
      <span class="hint">레몬 에이드가 라벨을 읽고 있어요.</span>
    </div>
  </div>
  <div class="field">
    <span class="lbl">복용 시간 (선택)</span>
    <div class="chip-row">
      <span class="chip active"><i data-lucide="sun"></i>아침</span>
      <span class="chip"><i data-lucide="sun-medium"></i>점심</span>
      <span class="chip active"><i data-lucide="moon"></i>저녁</span>
      <span class="chip"><i data-lucide="bed"></i>취침 전</span>
      <span class="chip"><i data-lucide="plus"></i>직접 추가</span>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body></html>

<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 (앱 아이콘은 둥근 사각 자동 마스킹) -->
  <rect width="1024" height="1024" fill="#FFFFFF"/>

  <!-- 그림자 -->
  <ellipse cx="512" cy="820" rx="280" ry="40" fill="#1A1F2E" opacity="0.08"/>

  <!-- 메인 레몬 몸통 (그라데이션) -->
  <defs>
    <radialGradient id="lemonGrad" cx="0.35" cy="0.30" r="0.85">
      <stop offset="0%"  stop-color="#FFE066"/>
      <stop offset="60%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#E8B800"/>
    </radialGradient>
  </defs>
  <circle cx="512" cy="540" r="360" fill="url(#lemonGrad)"/>

  <!-- 잎 -->
  <g transform="rotate(-28 660 250)">
    <ellipse cx="660" cy="250" rx="110" ry="60" fill="#B8E994"/>
    <ellipse cx="660" cy="250" rx="92" ry="48" fill="#A8D984"/>
  </g>

  <!-- 눈 2개 (작게, Splash 로고에는 없지만 앱 아이콘에는 살짝 표정) -->
  <circle cx="430" cy="520" r="28" fill="#1A1F2E"/>
  <circle cx="594" cy="520" r="28" fill="#1A1F2E"/>

  <!-- 볼터치 -->
  <ellipse cx="350" cy="600" rx="50" ry="32" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="674" cy="600" rx="50" ry="32" fill="#FFB6C1" opacity="0.6"/>

  <!-- 입 -->
  <path d="M 460 620 Q 512 660 564 620"
        stroke="#1A1F2E" stroke-width="14" stroke-linecap="round" fill="none"/>
</svg>

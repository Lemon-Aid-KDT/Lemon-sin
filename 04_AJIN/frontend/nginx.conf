# v11: Frontend nginx — 정적 SPA 서빙 (리버스프록시는 nginx-rp 가 별도)
# 이 컨테이너는 /api 트래픽을 받지 않음. 외부에서 /api 는 nginx-rp 가 backend 로 라우팅.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip (정적 산출물)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # 캐시 — 자산 파일은 hash 가 붙으므로 1년 캐싱
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — 모든 미매칭 요청은 index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # /api 와 /flower 는 외부 nginx-rp 가 처리 — 이 컨테이너는 받지 않음.
    # 만약 직접 도달하면 502 명시 (디버그용)
    location /api/ {
        return 502 "frontend container should not receive /api — check nginx-rp routing";
    }
}

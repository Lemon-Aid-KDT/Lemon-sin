<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:20px;background:#0A0E14;}
  .panel{border:1px solid #2A2520;background:#111820;padding:16px;}
  .header{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#D5CFC5;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #2A2520;}
  .header .ko{font-size:11px;letter-spacing:0;text-transform:none;color:#8A8276;font-weight:400;margin-left:10px;}
  .header .badge{font-size:11px;color:#7FD89E;letter-spacing:0.08em;}
  .body{font-size:13px;color:#E8E1D5;line-height:1.7;}
  .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed #2A2520;}
  .row:last-child{border:0;}
  .k{color:#D5CFC5;font-family:var(--hud-font-mono);font-size:12px;letter-spacing:0.06em;}
  .v{color:#E8E1D5;font-variant-numeric:tabular-nums;}
</style></head>
<body><div class="panel">
  <div class="header"><span>SYSTEM REGISTRY<span class="ko">시스템 등록 현황</span></span><span class="badge">29 / 29 ●</span></div>
  <div class="body">
    <div class="row"><span class="k">[ERROR_CODES]</span><span class="v">201 / 201</span></div>
    <div class="row"><span class="k">[MOLD_ASSETS]</span><span class="v">25 / 25</span></div>
    <div class="row"><span class="k">[SPC_PROCESS]</span><span class="v">5 / 5</span></div>
    <div class="row"><span class="k">[DRAWINGS]</span><span class="v">418 / 418</span></div>
  </div>
</div></body></html>

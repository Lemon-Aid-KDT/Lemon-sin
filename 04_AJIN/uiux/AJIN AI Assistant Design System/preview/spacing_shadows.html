<!doctype html><html><head><meta charset="utf-8">
<style>
body{padding:20px;background:#0A0E14;font-family:Pretendard,'Noto Sans KR',sans-serif;margin:0;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.demo{height:100px;background:#111820;border:1px solid #2A2520;display:flex;align-items:center;justify-content:center;color:#E8E1D5;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;}
.lbl{font-size:11px;color:#D5CFC5;letter-spacing:0.1em;text-transform:uppercase;margin-top:8px;font-family:ui-monospace,monospace;}
.glow{box-shadow:0 0 10px #FCB13244, 0 0 20px #FCB13222;border-color:#FCB13255;}
.press{box-shadow:inset 0 0 0 1px #FCB132;}
.sm{box-shadow:0 1px 0 rgba(0,0,0,0.6), 0 2px 6px rgba(0,0,0,0.35);}
</style></head><body><div class="grid">
<div><div class="demo sm">DEFAULT</div><div class="lbl">--shadow-sm</div></div>
<div><div class="demo glow">GOLD GLOW</div><div class="lbl">--shadow-glow · dark only</div></div>
<div><div class="demo press">PRESS RING</div><div class="lbl">--shadow-press · inset 1px</div></div>
</div></body></html>

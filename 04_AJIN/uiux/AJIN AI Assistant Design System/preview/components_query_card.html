<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:20px;background:#0A0E14;}
  .card{padding:16px;border:1px solid #2A2520;background:#111820;}
  .meta{display:flex;justify-content:space-between;font-size:11px;color:#D5CFC5;letter-spacing:0.08em;text-transform:uppercase;font-family:var(--hud-font-mono);margin-bottom:10px;padding-bottom:8px;border-bottom:1px dashed #2A2520;}
  .conf{color:#FCB132;font-weight:700;}
  .title{font-size:16px;font-weight:700;color:#FCB132;margin:6px 0 8px;}
  .body{font-size:14px;color:#E8E1D5;line-height:1.7;}
  mark{background:#FCB13233;color:#FFD066;padding:1px 3px;border-radius:2px;}
</style></head>
<body>
  <div class="card">
    <div class="meta"><span>출처: ChromaDB</span><span class="conf">신뢰도 87%</span></div>
    <div class="title">품질관리 SOP — 8D 보고서 작성 가이드</div>
    <div class="body">8D 프로세스는 <mark>D1~D8</mark> 단계로 구성되며, 각 단계에서 <mark>근본원인분석</mark>과 시정조치를 수행합니다. 본 가이드는 품질보증팀 표준 절차서를 기반으로 작성되었습니다.</div>
  </div>
</body></html>

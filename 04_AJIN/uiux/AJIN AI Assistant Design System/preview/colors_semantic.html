<!doctype html><html><head><meta charset="utf-8">
<style>
body{padding:20px;background:#0A0E14;font-family:Pretendard,'Noto Sans KR',sans-serif;margin:0;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.sw{display:flex;flex-direction:column;}
.chip{height:80px;border:1px solid #2A2520;display:flex;align-items:center;justify-content:center;}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px;vertical-align:middle;}
.name{font-size:12px;letter-spacing:0.08em;text-transform:uppercase;font-weight:600;}
.meta{padding:8px 0 0;}
.hex{font-size:11px;color:#D5CFC5;font-family:ui-monospace,monospace;}
.role{font-size:11px;color:#D5CFC5;text-transform:uppercase;letter-spacing:0.08em;}
</style></head><body><div class="grid">
<div class="sw"><div class="chip" style="background:#2D8A4E22;border-color:#2D8A4E"><span class="name" style="color:#7FD89E"><span class="dot" style="background:#2D8A4E"></span>ON-LINE</span></div><div class="meta"><div class="role">SUCCESS</div><div class="hex">#2D8A4E</div></div></div>
<div class="sw"><div class="chip" style="background:#E8A31722;border-color:#E8A317"><span class="name" style="color:#FFD27A"><span class="dot" style="background:#E8A317"></span>WARNING</span></div><div class="meta"><div class="role">WARN</div><div class="hex">#E8A317</div></div></div>
<div class="sw"><div class="chip" style="background:#C0392B22;border-color:#C0392B"><span class="name" style="color:#F08074"><span class="dot" style="background:#C0392B"></span>CRITICAL</span></div><div class="meta"><div class="role">DANGER</div><div class="hex">#C0392B</div></div></div>
<div class="sw"><div class="chip" style="background:#2980B922;border-color:#2980B9"><span class="name" style="color:#7BB8DD"><span class="dot" style="background:#2980B9"></span>INFO</span></div><div class="meta"><div class="role">INFO</div><div class="hex">#2980B9</div></div></div>
</div></body></html>

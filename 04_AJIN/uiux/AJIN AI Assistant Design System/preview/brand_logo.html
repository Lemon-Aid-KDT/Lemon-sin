<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--hud-font);}
  .wrap{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:100vh;}
  .pane{padding:36px;display:flex;flex-direction:column;gap:28px;justify-content:center;}
  .dark{background:#0A0E14;color:#E8E1D5;}
  .light{background:#FAF8F5;color:#2C241A;}
  .lbl{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;font-family:ui-monospace,monospace;opacity:0.55;}
  .full{display:flex;align-items:center;}
  .full img{width:280px;height:auto;display:block;}
  .lockup{display:flex;align-items:center;gap:14px;padding-top:14px;border-top:1px solid rgba(125,125,125,0.25);}
  .mark{width:48px;height:48px;flex-shrink:0;}
  .lockup .meta{display:flex;flex-direction:column;line-height:1.1;}
  .meta .brand{font-size:18px;font-weight:800;letter-spacing:0.06em;}
  .meta .sub{font-size:10px;letter-spacing:0.32em;margin-top:4px;}
  .dark .sub{color:#FCB132;}
  .light .sub{color:#A87510;}
  .stripe{display:flex;align-items:center;gap:10px;font-size:11px;letter-spacing:0.12em;font-family:ui-monospace,monospace;text-transform:uppercase;}
  .dark .stripe b{color:#FCB132;}
  .light .stripe b{color:#A87510;}
</style></head>
<body><div class="wrap">

  <div class="pane dark">
    <div class="lbl">DARK · 다크 모드 · WHITE WORDMARK SVG</div>
    <div class="full"><img src="../assets/ajin_logo_dark.svg" alt="AJIN INDUSTRIAL CO., LTD."></div>

    <div class="lockup">
      <img class="mark" src="../assets/ajin_symbol.svg" alt="AJIN symbol">
      <div class="meta"><span class="brand">AJIN INDUSTRY</span><span class="sub">AI ASSISTANT</span></div>
    </div>

    <div class="stripe"><b>SYMBOL</b><span>심볼 #FCB132</span><span>·</span><span>WORDMARK · #FFFFFF</span></div>
  </div>

  <div class="pane light">
    <div class="lbl">LIGHT · 라이트 모드 · DARK WORDMARK SVG</div>
    <div class="full"><img src="../assets/ajin_logo_light.svg" alt="AJIN INDUSTRIAL CO., LTD."></div>

    <div class="lockup">
      <img class="mark" src="../assets/ajin_symbol.svg" alt="AJIN symbol">
      <div class="meta"><span class="brand">AJIN INDUSTRY</span><span class="sub">AI ASSISTANT</span></div>
    </div>

    <div class="stripe"><b>SYMBOL</b><span>심볼 #FCB132</span><span>·</span><span>WORDMARK · #1A1A1A</span></div>
  </div>

</div></body></html>

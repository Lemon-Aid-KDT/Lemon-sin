<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:20px;background:#0A0E14;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .card{padding:16px;background:#111820;border:1px solid #2A2520;border-radius:2px;position:relative;}
  .corner-tl,.corner-br{position:absolute;width:10px;height:10px;border-color:#FCB132;}
  .corner-tl{top:-1px;left:-1px;border-top:1px solid;border-left:1px solid;}
  .corner-br{bottom:-1px;right:-1px;border-bottom:1px solid;border-right:1px solid;}
  .val{font-size:36px;font-weight:700;color:#FCB132;line-height:1;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;}
  .en{font-size:11px;color:#D5CFC5;letter-spacing:0.12em;text-transform:uppercase;margin-top:10px;font-weight:600;}
  .ko{font-size:12px;color:#8A8276;margin-top:2px;}
</style></head>
<body><div class="grid">
  <div class="card"><span class="corner-tl"></span><span class="corner-br"></span><div class="val">329</div><div class="en">EMPLOYEES</div><div class="ko">사원 · 인원 검색 인덱스</div></div>
  <div class="card"><span class="corner-tl"></span><span class="corner-br"></span><div class="val">201</div><div class="en">ERROR CODES</div><div class="ko">에러코드</div></div>
  <div class="card"><span class="corner-tl"></span><span class="corner-br"></span><div class="val">29</div><div class="en">DEPARTMENTS</div><div class="ko">부서</div></div>
  <div class="card"><span class="corner-tl"></span><span class="corner-br"></span><div class="val">33</div><div class="en">ACCOUNTS</div><div class="ko">테스트 계정</div></div>
</div></body></html>

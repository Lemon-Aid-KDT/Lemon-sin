<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:20px;background:#0A0E14;}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .lbl{font-size:11px;color:#D5CFC5;letter-spacing:0.1em;text-transform:uppercase;font-family:var(--hud-font-mono);}
  input,select{font-family:var(--hud-font);font-size:15px;padding:10px 12px;border:1px solid #2A2520;background:#1A2030;color:#E8E1D5;border-radius:2px;outline:none;width:100%;}
  input:focus{border-color:#FCB132;box-shadow:0 0 0 3px #FCB13222;}
  .sql-bar{display:flex;align-items:center;gap:10px;border:1px solid #2A2520;background:#1A2030;padding:6px;border-radius:2px;}
  .sql-bar .prefix{color:#FCB132;font-family:var(--hud-font-mono);font-size:12px;letter-spacing:0.1em;padding:0 8px;}
  .sql-bar input{border:0;background:transparent;flex:1;padding:8px 0;}
  .sql-bar button{background:#FCB132;color:#0A0E14;border:0;padding:8px 14px;font-weight:700;letter-spacing:0.08em;font-size:12px;cursor:pointer;}
</style></head>
<body>
  <div class="field">
    <span class="lbl">사원번호 · EMPLOYEE ID</span>
    <input value="EMP-20260426" />
  </div>
  <div class="field">
    <span class="lbl">FTS5 / SQL</span>
    <div class="sql-bar">
      <span class="prefix">&gt; FTS5/SQL:</span>
      <input value="SELECT processes FROM SPC WHERE anomaly = 1" />
      <button>실행</button>
    </div>
  </div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{padding:20px;background:#0A0E14;font-family:var(--hud-font);margin:0;}
.card{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.sw{display:flex;flex-direction:column;}
.chip{height:84px;border:1px solid #2A2520;display:flex;align-items:flex-end;padding:6px;}
.meta{padding:8px 0 0;font-size:11px;letter-spacing:0.08em;color:#D5CFC5;text-transform:uppercase;}
.hex{font-size:11px;color:#E8E1D5;font-family:ui-monospace,monospace;}
.tag{font-size:10px;letter-spacing:0.1em;color:#0A0E14;background:#FCB132;padding:2px 5px;font-weight:700;font-family:ui-monospace,monospace;}
</style></head><body><div class="card">
<div class="sw"><div class="chip" style="background:#0A0E14"></div><div class="meta">BG</div><div class="hex">#0A0E14</div></div>
<div class="sw"><div class="chip" style="background:#111820"></div><div class="meta">SURFACE</div><div class="hex">#111820</div></div>
<div class="sw"><div class="chip" style="background:#1A2030"></div><div class="meta">SURFACE-2</div><div class="hex">#1A2030</div></div>
<div class="sw"><div class="chip" style="background:#2A2520"></div><div class="meta">BORDER</div><div class="hex">#2A2520</div></div>
<div class="sw"><div class="chip" style="background:#FCB132;box-shadow:0 0 14px #FCB13255"><span class="tag">심볼</span></div><div class="meta" style="color:#FCB132">SYMBOL · 심볼</div><div class="hex">#FCB132</div></div>
<div class="sw"><div class="chip" style="background:#E8E1D5"></div><div class="meta">TEXT</div><div class="hex">#E8E1D5</div></div>
</div></body></html>

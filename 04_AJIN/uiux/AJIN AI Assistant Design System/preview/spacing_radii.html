<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:20px;background:#0A0E14;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .ex{height:96px;background:#1A2030;border:1px solid #2A2520;display:flex;align-items:center;justify-content:center;color:#E8E1D5;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;}
  .lbl{font-size:11px;color:#D5CFC5;letter-spacing:0.1em;text-transform:uppercase;margin-top:8px;font-family:var(--hud-font-mono);}
</style></head>
<body><div class="grid">
  <div><div class="ex" style="border-radius:0">SHARP</div><div class="lbl">0px</div></div>
  <div><div class="ex" style="border-radius:2px">HUD</div><div class="lbl">2px · default</div></div>
  <div><div class="ex" style="border-radius:6px">SOFT</div><div class="lbl">6px · only inputs</div></div>
  <div><div class="ex" style="border-radius:999px">PILL</div><div class="lbl">999px · status pill</div></div>
</div></body></html>

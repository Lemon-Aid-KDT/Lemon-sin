<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>AJIN AI Assistant — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css?v=tahoe" />
<link rel="stylesheet" href="theme.css?v=tahoe" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="TopBar.jsx"></script>
<script type="text/babel" src="LeftSidebar.jsx"></script>
<script type="text/babel" src="RightPanel.jsx"></script>
<script type="text/babel" src="Login.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Chat.jsx"></script>
<script type="text/babel" src="Search.jsx"></script>
<script type="text/babel" src="Draft.jsx"></script>
<script type="text/babel" src="Compliance.jsx"></script>
<script type="text/babel" src="Admin.jsx"></script>
<script type="text/babel" src="Equipment.jsx"></script>
<script type="text/babel">
function App(){
  const [authed, setAuthed] = React.useState(true);
  const [active, setActive] = React.useState('dashboard');
  const [theme, setTheme] = React.useState('dark');
  const [rightOn, setRightOn] = React.useState(true);
  const [streaming, setStreaming] = React.useState(false);
  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme === 'auto' ? (new Date().getHours() >= 6 && new Date().getHours() < 18 ? 'light' : 'dark') : theme);
  }, [theme]);
  if (!authed) return <Login onLogin={() => setAuthed(true)} />;
  return (
    <div className="app-shell" data-screen-label={`AJIN HUD · ${active}`}>
      <TopBar rightOn={rightOn} onToggleRight={() => setRightOn(!rightOn)} onLogout={() => setAuthed(false)} />
      <div className={'app-body' + (rightOn ? '' : ' no-right')}>
        <LeftSidebar active={active} onNav={setActive} theme={theme} onTheme={setTheme} streaming={streaming} />
        <main style={{minWidth:0,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          {active === 'dashboard' && <Dashboard onNav={setActive} />}
          {active === 'chat' && <Chat streaming={streaming} setStreaming={setStreaming} />}
          {active === 'search' && <Search />}
          {active === 'draft' && <Draft />}
          {active === 'compliance' && <Compliance />}
          {active === 'admin' && <Admin />}
          {active === 'equipment' && <Equipment />}
        </main>
        {rightOn && <RightPanel />}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

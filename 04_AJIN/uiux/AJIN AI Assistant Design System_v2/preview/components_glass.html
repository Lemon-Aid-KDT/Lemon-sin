<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;background:#0A0E14;background-image:radial-gradient(circle at 20% 10%, #FCB13233, transparent 40%),radial-gradient(circle at 80% 80%, #2980B944, transparent 40%);min-height:140px;display:flex;align-items:center;justify-content:center;}
  .stack{display:flex;gap:14px;}
  .glass{padding:14px 22px;background:color-mix(in oklab, #111820 55%, transparent);backdrop-filter:blur(24px) saturate(140%);-webkit-backdrop-filter:blur(24px) saturate(140%);border:1px solid color-mix(in oklab, #2A2520 65%, transparent);box-shadow:inset 0 1px 0 rgba(255,255,255,0.18), 0 8px 32px rgba(0,0,0,0.24);color:#E8E1D5;}
  .lbl{font-size:11px;letter-spacing:0.12em;color:#D5CFC5;text-transform:uppercase;}
  .val{font-size:22px;font-weight:700;color:#FCB132;margin-top:4px;font-variant-numeric:tabular-nums;}
</style></head>
<body><div class="stack">
  <div class="glass"><div class="lbl">GPU</div><div class="val">42%</div></div>
  <div class="glass"><div class="lbl">LATENCY</div><div class="val">124ms</div></div>
  <div class="glass"><div class="lbl">QPS</div><div class="val">8.4k</div></div>
</div></body></html>

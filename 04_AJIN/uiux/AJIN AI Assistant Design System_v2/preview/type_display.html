<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:20px;background:#0A0E14;}
  .stack{display:grid;gap:16px;}
  .row{display:flex;align-items:baseline;gap:14px;border-bottom:1px dashed #2A2520;padding-bottom:10px;}
  .label{font-size:11px;color:#D5CFC5;letter-spacing:0.1em;text-transform:uppercase;width:110px;flex-shrink:0;font-family:var(--hud-font-mono);}
  .specimen{color:#E8E1D5;font-weight:700;}
</style></head>
<body><div class="stack">
  <div class="row"><span class="label">3XL · 36/700</span><span class="specimen" style="font-size:36px;color:#FCB132">329</span></div>
  <div class="row"><span class="label">2XL · 28/700</span><span class="specimen" style="font-size:28px">대시보드 · DASHBOARD</span></div>
  <div class="row"><span class="label">XL · 20/700</span><span class="specimen" style="font-size:20px">CORE MODULES</span></div>
  <div class="row"><span class="label">LG · 18/600</span><span class="specimen" style="font-size:18px;font-weight:600">검색 결과 · QUERY RESULTS</span></div>
</div></body></html>

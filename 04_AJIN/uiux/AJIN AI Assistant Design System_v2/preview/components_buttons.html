<!doctype html><html><head><meta charset="utf-8">
<style>
body{padding:20px;background:#0A0E14;font-family:Pretendard,'Noto Sans KR',sans-serif;margin:0;}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
button{font-family:inherit;font-size:13px;padding:9px 18px;border-radius:2px;border:1px solid #2A2520;background:#1A2030;color:#E8E1D5;cursor:pointer;letter-spacing:0.04em;transition:all .2s;}
button:hover{border-color:#FCB132;color:#FCB132;}
button.primary{background:#FCB132;color:#0A0E14;border-color:#FCB132;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;}
button.primary:hover{background:#E89E1A;color:#0A0E14;}
button.ghost{background:transparent;}
button:disabled{opacity:.5;cursor:not-allowed;}
button.glow{box-shadow:0 0 10px #FCB13244, 0 0 20px #FCB13222;}
.lbl{font-size:11px;color:#D5CFC5;letter-spacing:0.1em;text-transform:uppercase;margin:14px 0 8px;font-family:ui-monospace,monospace;}
</style></head><body>
<div class="lbl">PRIMARY · SECONDARY · GHOST · DISABLED</div>
<div class="row">
<button class="primary glow">EXECUTE</button>
<button>DOWNLOAD</button>
<button class="ghost">CANCEL</button>
<button disabled>RUN</button>
</div>
<div class="lbl">WITH ICONS · AS LABELS</div>
<div class="row">
<button>＋ NEW QUERY</button>
<button class="primary">↑ 전송</button>
<button>↓ EXPORT · CSV</button>
</div>
</body></html>

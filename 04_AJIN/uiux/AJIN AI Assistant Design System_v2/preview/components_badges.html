<!doctype html><html><head><meta charset="utf-8">
<style>
body{padding:20px;background:#0A0E14;font-family:Pretendard,'Noto Sans KR',sans-serif;margin:0;}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border:1px solid;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;font-weight:700;border-radius:2px;font-family:ui-monospace,monospace;}
.b-ok{color:#7FD89E;border-color:#2D8A4E;background:#2D8A4E22;}
.b-warn{color:#FFD27A;border-color:#E8A317;background:#E8A31722;}
.b-fail{color:#F08074;border-color:#C0392B;background:#C0392B22;}
.b-info{color:#7BB8DD;border-color:#2980B9;background:#2980B922;}
.b-off{color:#D5CFC5;border-color:#2A2520;background:transparent;}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;}
.lbl{font-size:11px;color:#D5CFC5;letter-spacing:0.1em;text-transform:uppercase;margin:0 0 12px;font-family:ui-monospace,monospace;}
</style></head><body>
<div class="lbl">STATUS BADGES</div>
<div class="row">
<span class="badge b-ok"><span class="dot"></span>ON-LINE</span>
<span class="badge b-warn"><span class="dot"></span>WARNING</span>
<span class="badge b-fail"><span class="dot"></span>CRITICAL</span>
<span class="badge b-info"><span class="dot"></span>SYNC</span>
<span class="badge b-off">○ OFFLINE</span>
</div>
<div class="lbl" style="margin-top:18px">LOG LINE STYLE</div>
<div style="font-family:ui-monospace,monospace;font-size:12px;color:#D5CFC5;line-height:1.9;">
<div><span style="color:#FCB132">[AUTH]</span> JWT_ACTIVE <span style="color:#2D8A4E">●</span> OK</div>
<div><span style="color:#FCB132">[RBAC]</span> LEVEL · L6 (ADMIN)</div>
<div><span style="color:#FCB132">[SYNC]</span> ChromaDB ↔ ON-PREMISE <span style="color:#2D8A4E">●</span></div>
<div><span style="color:#FCB132">[LLM]</span> QWEN-3.5 · 124ms <span style="color:#2D8A4E">●</span></div>
</div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:20px;background:#0A0E14;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .item{display:flex;flex-direction:column;align-items:flex-start;gap:8px;}
  .box{background:#1A2030;border:1px solid #2A2520;}
  .lbl{font-size:11px;color:#D5CFC5;letter-spacing:0.08em;text-transform:uppercase;font-family:var(--hud-font-mono);}
  .val{font-size:11px;color:#E8E1D5;font-family:var(--hud-font-mono);}
</style></head>
<body><div class="grid">
  <div class="item"><div class="box" style="width:8px;height:8px"></div><div class="lbl">XS · 8</div><div class="val">--space-1</div></div>
  <div class="item"><div class="box" style="width:12px;height:12px"></div><div class="lbl">SM · 12</div><div class="val">--space-2</div></div>
  <div class="item"><div class="box" style="width:16px;height:16px"></div><div class="lbl">BASE · 16</div><div class="val">card padding</div></div>
  <div class="item"><div class="box" style="width:20px;height:20px"></div><div class="lbl">MD · 20</div><div class="val">section gap</div></div>
  <div class="item"><div class="box" style="width:24px;height:24px"></div><div class="lbl">LG · 24</div><div class="val">--space-5</div></div>
  <div class="item"><div class="box" style="width:32px;height:32px"></div><div class="lbl">XL · 32</div><div class="val">block gap</div></div>
  <div class="item"><div class="box" style="width:48px;height:48px"></div><div class="lbl">2XL · 48</div><div class="val">page top</div></div>
  <div class="item"><div class="box" style="width:64px;height:64px"></div><div class="lbl">3XL · 64</div><div class="val">hero block</div></div>
</div></body></html>

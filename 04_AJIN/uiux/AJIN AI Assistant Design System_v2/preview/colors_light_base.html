<!doctype html><html><head><meta charset="utf-8">
<style>
html,body{background:#FAF8F5;color:#2C241A;font-family:Pretendard,'Noto Sans KR',sans-serif;}
body{padding:20px;margin:0;}
.card{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
.sw{display:flex;flex-direction:column;}
.chip{height:84px;border:1px solid #D6CFC3;display:flex;align-items:flex-end;padding:6px;}
.meta{padding:8px 0 0;font-size:11px;letter-spacing:0.08em;color:#5C4E3C;text-transform:uppercase;}
.hex{font-size:11px;color:#2C241A;font-family:ui-monospace,monospace;}
.tag{font-size:10px;letter-spacing:0.1em;color:#2C241A;background:rgba(255,255,255,0.85);padding:2px 5px;font-weight:700;font-family:ui-monospace,monospace;}
</style></head><body><div class="card">
<div class="sw"><div class="chip" style="background:#FAF8F5"></div><div class="meta">BG</div><div class="hex">#FAF8F5</div></div>
<div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta">SURFACE</div><div class="hex">#FFFFFF</div></div>
<div class="sw"><div class="chip" style="background:#F0EBE3"></div><div class="meta">SIDEBAR</div><div class="hex">#F0EBE3</div></div>
<div class="sw"><div class="chip" style="background:#D6CFC3"></div><div class="meta">BORDER</div><div class="hex">#D6CFC3</div></div>
<div class="sw"><div class="chip" style="background:#FCB132"><span class="tag">심볼 GOLD</span></div><div class="meta" style="color:#A87510">SYMBOL · 심볼</div><div class="hex">#FCB132</div></div>
<div class="sw"><div class="chip" style="background:#FFD700"><span class="tag">심볼 YELLOW</span></div><div class="meta" style="color:#A88B00">SYMBOL · 심볼</div><div class="hex">#FFD700</div></div>
<div class="sw"><div class="chip" style="background:#2C241A"></div><div class="meta">TEXT</div><div class="hex">#2C241A</div></div>
</div></body></html>

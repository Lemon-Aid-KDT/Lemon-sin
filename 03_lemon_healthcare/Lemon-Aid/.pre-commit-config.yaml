# =============================================================================
# Pre-commit hooks configuration
# 설치: pip install pre-commit && pre-commit install
# 실행: pre-commit run --all-files (전체 검사)
# =============================================================================

repos:
  # ---------------------------------------------------------------------------
  # 일반 파일 검증
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace            # 줄 끝 공백 제거
        files: &lemon_aid_files ^(03_lemon_healthcare/Lemon-Aid/)?(backend|mobile|docs|assets|data|outputs|scripts|PROJECT_GUIDE\.md|README\.md|guide\.html|\.gitignore|\.pre-commit-config\.yaml|\.markdownlint\.json|\.secrets\.baseline)
        exclude: \.md$                      # Markdown 줄바꿈 보존
      - id: end-of-file-fixer               # 파일 끝 개행
        files: *lemon_aid_files
      - id: check-yaml                      # YAML 문법 검증
        files: *lemon_aid_files
      - id: check-toml                      # TOML 문법 검증
        files: *lemon_aid_files
      - id: check-json                      # JSON 문법 검증
        files: *lemon_aid_files
      - id: check-added-large-files         # 큰 파일 커밋 방지
        files: *lemon_aid_files
        args: ['--maxkb=5000']              # 5MB 초과 차단
      - id: check-merge-conflict            # 머지 충돌 마커 검출
        files: *lemon_aid_files
      - id: detect-private-key              # 개인 키 검출
        files: *lemon_aid_files
      - id: mixed-line-ending               # 줄바꿈 통일
        files: *lemon_aid_files
        args: ['--fix=lf']

  # ---------------------------------------------------------------------------
  # Python: Black (포매터)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        files: ^(03_lemon_healthcare/Lemon-Aid/)?backend/.*\.py$
        args: ['--line-length=100']

  # ---------------------------------------------------------------------------
  # Python: Ruff (린터 + import 정렬)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        files: ^(03_lemon_healthcare/Lemon-Aid/)?backend/.*\.py$
        args: ['--fix']
      - id: ruff-format
        files: ^(03_lemon_healthcare/Lemon-Aid/)?backend/.*\.py$

  # ---------------------------------------------------------------------------
  # Python: mypy (타입 체크)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^(03_lemon_healthcare/Lemon-Aid/)?backend/(supplement_analysis|food_image_analysis|ai_agent_chat)/src/.*\.py$
        args: ['--ignore-missing-imports']
        additional_dependencies:
          - pydantic
          - types-requests

  # ---------------------------------------------------------------------------
  # Markdown: 마크다운 문법 검증
  # ---------------------------------------------------------------------------
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.40.0
    hooks:
      - id: markdownlint
        entry: bash -c 'root=.; prefix=03_lemon_healthcare/Lemon-Aid; if [ -d "$prefix" ]; then root=$prefix; fi; args=(); for f in "$@"; do case "$f" in "$prefix"/*) args+=("${f#"$prefix"/}") ;; *) args+=("$f") ;; esac; done; cd "$root" && markdownlint --config .markdownlint.json "${args[@]}"' --
        files: ^(03_lemon_healthcare/Lemon-Aid/)?(backend|mobile|docs|outputs|PROJECT_GUIDE\.md|README\.md).*\.(md|markdown)$

  # ---------------------------------------------------------------------------
  # 보안: 비밀 정보 검출
  # ---------------------------------------------------------------------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        entry: bash -c 'root=.; prefix=03_lemon_healthcare/Lemon-Aid; if [ -d "$prefix" ]; then root=$prefix; fi; args=(); for f in "$@"; do case "$f" in "$prefix"/*) args+=("${f#"$prefix"/}") ;; *) args+=("$f") ;; esac; done; cd "$root" && detect-secrets-hook --baseline .secrets.baseline "${args[@]}"' --
        files: *lemon_aid_files
        exclude: ^(03_lemon_healthcare/Lemon-Aid/)?(\.git/|\.venv/|node_modules/|\.secrets\.baseline$)

  # ---------------------------------------------------------------------------
  # 커밋 메시지 컨벤션 검증 (Conventional Commits)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - chore
          - ci
          - build
          - revert
          - data
          - ops

# Flutter/Dart는 별도 pre-commit 통합이 어려우므로
# IDE 저장 시 자동 포매팅 + CI에서 검증하는 방식 권장

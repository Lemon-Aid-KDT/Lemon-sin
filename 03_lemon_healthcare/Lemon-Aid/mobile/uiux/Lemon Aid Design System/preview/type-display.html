<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="preview-base.css">
<style>
  body { display: grid; gap: 10px; }
  .display-line { font: 800 84px/0.92 var(--font-display);
                  letter-spacing: -0.03em; color: var(--ink-900); }
  .display-line .lemon { color: var(--lemon-500); }
  .display-line .aid { color: var(--leaf-500); }
  .h1 { font: 700 34px/1.14 "AtoZ", var(--font-body); margin: 0; letter-spacing: -0.01em; }
  .h2 { font: 700 26px/1.20 "AtoZ", var(--font-body); margin: 0; color: var(--ink-700); }
  .h3 { font: 500 20px/1.30 "AtoZ", var(--font-body); margin: 0; color: var(--ink-700); }
</style></head>
<body class="preview" style="height: 280px;">
  <div class="display-line"><span class="lemon">Lemon</span>-<span class="aid">Aid</span></div>
  <div class="row" style="gap: 20px; align-items: baseline;">
    <span class="tok">AtoZ 800 · 84px / -0.03em</span>
    <span class="tok">--t-display-1</span>
  </div>
  <div class="hairline"></div>
  <div class="h1">한 장의 사진으로 끝.</div>
  <div class="row" style="gap: 14px; align-items: baseline;">
    <span class="cap">H1 · AtoZ 700 · 34/40</span>
    <span class="tok">--t-h1</span>
  </div>
  <div class="h2">병원 기록을 기억하는 Agent</div>
  <div class="row" style="gap: 14px; align-items: baseline;">
    <span class="cap">H2 · AtoZ 700 · 26/32</span>
    <span class="tok">--t-h2</span>
  </div>
  <div class="h3">오늘의 영양 상태 · 부족 영양소</div>
  <div class="row" style="gap: 14px; align-items: baseline;">
    <span class="cap">H3 · AtoZ 500 · 20/26</span>
    <span class="tok">--t-h3</span>
  </div>
</body></html>

# =============================================================================
# Mobile CI: Flutter 코드 자동 검증
# 트리거: 03_lemon_healthcare/yeong-Vision-Nutrition/mobile/** 변경 시
# =============================================================================

name: Mobile CI

on:
  push:
    branches: [main, develop, yeong-tech]
    paths:
      - '03_lemon_healthcare/yeong-Vision-Nutrition/mobile/**'
      - '03_lemon_healthcare/.github/workflows/ci-mobile.yml'
  pull_request:
    branches: [main, develop, yeong-tech]
    paths:
      - '03_lemon_healthcare/yeong-Vision-Nutrition/mobile/**'
      - '03_lemon_healthcare/.github/workflows/ci-mobile.yml'

jobs:
  lint-and-test:
    name: Flutter Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 03_lemon_healthcare/yeong-Vision-Nutrition/mobile

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Flutter project
        id: flutter_project
        run: |
          if [ -f pubspec.yaml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No pubspec.yaml found; skipping Flutter checks."
          fi

      # -----------------------------------------------------------------------
      # 2. Setup Java (Android 빌드용)
      # -----------------------------------------------------------------------
      - name: Set up Java
        if: steps.flutter_project.outputs.present == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # -----------------------------------------------------------------------
      # 3. Setup Flutter
      # -----------------------------------------------------------------------
      - name: Set up Flutter
        if: steps.flutter_project.outputs.present == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # -----------------------------------------------------------------------
      # 4. Verify Flutter Installation
      # -----------------------------------------------------------------------
      - name: Flutter doctor
        if: steps.flutter_project.outputs.present == 'true'
        run: flutter doctor -v

      # -----------------------------------------------------------------------
      # 5. Install Dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        if: steps.flutter_project.outputs.present == 'true'
        run: flutter pub get

      # -----------------------------------------------------------------------
      # 6. Format Check
      # -----------------------------------------------------------------------
      - name: Verify formatting
        if: steps.flutter_project.outputs.present == 'true'
        run: dart format --output=none --set-exit-if-changed lib test

      # -----------------------------------------------------------------------
      # 7. Static Analysis
      # -----------------------------------------------------------------------
      - name: Analyze project source
        if: steps.flutter_project.outputs.present == 'true'
        run: flutter analyze --no-fatal-infos

      # -----------------------------------------------------------------------
      # 8. Run Tests
      # -----------------------------------------------------------------------
      - name: Run tests
        if: steps.flutter_project.outputs.present == 'true'
        run: flutter test --coverage

      # -----------------------------------------------------------------------
      # 9. Build Verification (Android APK only — iOS는 macOS runner 필요)
      # -----------------------------------------------------------------------
      - name: Build APK (debug)
        if: steps.flutter_project.outputs.present == 'true'
        run: flutter build apk --debug
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # iOS 빌드 검증 (선택 — macOS runner 사용, 비용 발생)

# =============================================================================
# Mobile CI: Flutter 코드 자동 검증
# 트리거: 03_lemon_healthcare/pr1/mobile/** 변경 시
# =============================================================================

name: Mobile CI

on:
  push:
    branches: [main, develop]
    paths:
      - '03_lemon_healthcare/pr1/mobile/**'
      - '03_lemon_healthcare/.github/workflows/ci-mobile.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '03_lemon_healthcare/pr1/mobile/**'
      - '03_lemon_healthcare/.github/workflows/ci-mobile.yml'

jobs:
  lint-and-test:
    name: Flutter Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 03_lemon_healthcare/pr1/mobile

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Setup Java (Android 빌드용)
      # -----------------------------------------------------------------------
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # -----------------------------------------------------------------------
      # 3. Setup Flutter
      # -----------------------------------------------------------------------
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # -----------------------------------------------------------------------
      # 4. Verify Flutter Installation
      # -----------------------------------------------------------------------
      - name: Flutter doctor
        run: flutter doctor -v

      # -----------------------------------------------------------------------
      # 5. Install Dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: flutter pub get

      # -----------------------------------------------------------------------
      # 6. Format Check
      # -----------------------------------------------------------------------
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      # -----------------------------------------------------------------------
      # 7. Static Analysis
      # -----------------------------------------------------------------------
      - name: Analyze project source
        run: flutter analyze --no-fatal-infos

      # -----------------------------------------------------------------------
      # 8. Run Tests
      # -----------------------------------------------------------------------
      - name: Run tests
        run: flutter test --coverage

      # -----------------------------------------------------------------------
      # 9. Build Verification (Android APK only — iOS는 macOS runner 필요)
      # -----------------------------------------------------------------------
      - name: Build APK (debug)
        run: flutter build apk --debug
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # iOS 빌드 검증 (선택 — macOS runner 사용, 비용 발생)

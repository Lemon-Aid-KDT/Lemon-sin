# =============================================================================
# Backend CI: Python (FastAPI) 코드 자동 검증
# 트리거: 03_lemon_healthcare/backend/** 변경 시
# =============================================================================

name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - '03_lemon_healthcare/backend/**'
      - '03_lemon_healthcare/.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '03_lemon_healthcare/backend/**'
      - '03_lemon_healthcare/.github/workflows/ci-backend.yml'

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    defaults:
      run:
        working-directory: 03_lemon_healthcare/backend

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Setup Python
      # -----------------------------------------------------------------------
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 03_lemon_healthcare/backend/requirements.txt

      # -----------------------------------------------------------------------
      # 3. Install Dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black ruff mypy pytest pytest-cov

      # -----------------------------------------------------------------------
      # 4. Code Formatter Check (Black)
      # -----------------------------------------------------------------------
      - name: Check formatting with Black
        run: black --check --line-length=100 src tests

      # -----------------------------------------------------------------------
      # 5. Linter (Ruff)
      # -----------------------------------------------------------------------
      - name: Lint with Ruff
        run: ruff check src tests

      # -----------------------------------------------------------------------
      # 6. Type Check (mypy)
      # -----------------------------------------------------------------------
      - name: Type check with mypy
        run: mypy src --ignore-missing-imports
        continue-on-error: true   # mypy는 초기에 워닝만, 실패 처리 X

      # -----------------------------------------------------------------------
      # 7. Run Tests with Coverage
      # -----------------------------------------------------------------------
      - name: Run pytest
        run: |
          pytest --cov=src --cov-report=xml --cov-report=term-missing -v

      # -----------------------------------------------------------------------
      # 8. Upload Coverage (선택 - codecov 사용 시)
      # -----------------------------------------------------------------------
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./03_lemon_healthcare/backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
        continue-on-error: true

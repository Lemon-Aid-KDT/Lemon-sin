# =============================================================================
# Backend CI: Python (FastAPI) 코드 자동 검증
# 트리거: 03_lemon_healthcare/yeong-Vision-Nutrition/backend/** 변경 시
# =============================================================================

name: Backend CI

on:
  push:
    branches: [main, develop, yeong-tech]
    paths:
      - '03_lemon_healthcare/yeong-Vision-Nutrition/backend/**'
      - '03_lemon_healthcare/.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main, develop, yeong-tech]
    paths:
      - '03_lemon_healthcare/yeong-Vision-Nutrition/backend/**'
      - '03_lemon_healthcare/.github/workflows/ci-backend.yml'

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lemon_test
          POSTGRES_USER: lemon
          POSTGRES_PASSWORD: lemon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lemon -d lemon_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        python-version: ['3.13']
    env:
      DATABASE_URL: postgresql+asyncpg://lemon:lemon@localhost:5432/lemon_test
      TEST_DATABASE_URL: postgresql+asyncpg://lemon:lemon@localhost:5432/lemon_test

    defaults:
      run:
        working-directory: 03_lemon_healthcare/yeong-Vision-Nutrition/backend

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Setup Python
      # -----------------------------------------------------------------------
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 03_lemon_healthcare/yeong-Vision-Nutrition/backend/requirements-dev.txt

      # -----------------------------------------------------------------------
      # 3. Install Dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # -----------------------------------------------------------------------
      # 4. Code Formatter Check (Black)
      # -----------------------------------------------------------------------
      - name: Check formatting with Black
        run: black --check src tests alembic

      # -----------------------------------------------------------------------
      # 5. Linter (Ruff)
      # -----------------------------------------------------------------------
      - name: Lint with Ruff
        run: ruff check src tests alembic

      # -----------------------------------------------------------------------
      # 6. Type Check (mypy)
      # -----------------------------------------------------------------------
      - name: Type check with mypy
        run: mypy src tests --strict

      # -----------------------------------------------------------------------
      # 7. Settings / OpenAPI smoke
      # -----------------------------------------------------------------------
      - name: Validate settings and OpenAPI contract
        run: |
          python -c "from src.config import Settings; s=Settings(); assert s.database_url.startswith('postgresql+asyncpg://'); assert not s.enable_multimodal_llm and not s.enable_vision_classifier and not s.enable_image_learning_pipeline and not s.enable_pgvector_storage"
          python -c "from src.main import create_app; schema=create_app().openapi(); assert schema['openapi'].startswith('3.'); assert '/api/v1/supplements/analyze' in schema['paths']; assert '/api/v1/supplements/analyses/{analysis_id}/ocr-text' in schema['paths']"

      # -----------------------------------------------------------------------
      # 8. PostgreSQL migration smoke
      # -----------------------------------------------------------------------
      - name: Apply Alembic migrations against PostgreSQL
        run: |
          alembic upgrade head
          alembic current

      # -----------------------------------------------------------------------
      # 9. Run Tests with Coverage
      # -----------------------------------------------------------------------
      - name: Run pytest
        run: pytest --cov-report=xml --cov-report=term-missing

      # -----------------------------------------------------------------------
      # 10. Upload Coverage (선택 - codecov 사용 시)
      # -----------------------------------------------------------------------
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v4
        with:
          file: ./03_lemon_healthcare/yeong-Vision-Nutrition/backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
        continue-on-error: true

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = %(here)s/Nutrition-backend
path_separator = os
file_template = %%(rev)s_%%(slug)s

sqlalchemy.url = postgresql+asyncpg://lemon:lemon@localhost:5432/lemon

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

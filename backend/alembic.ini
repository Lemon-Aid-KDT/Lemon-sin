# Alembic 빈 골격 — Phase 1 후반에 본격 설정 예정.
# 참고: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# 마이그레이션 스크립트가 위치할 경로
script_location = alembic

# 마이그레이션 파일명 템플릿
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# 타임존
timezone = UTC

# DB 연결 URL (실제 값은 env.py에서 src.config.get_settings()로 로드)
sqlalchemy.url = postgresql+asyncpg://lemon:lemon@localhost:5432/lemon

[post_write_hooks]
# 자동 포매팅 훅 (Phase 1 후반에 활성화)
# hooks = black, ruff

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

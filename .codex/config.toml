# Lemon Aid 프로젝트 범위 Codex 기본값입니다.
# Codex는 프로젝트가 신뢰된 뒤 이 계층을 로드합니다.

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
model_reasoning_effort = "medium"
personality = "pragmatic"

[features]
multi_agent = true
codex_hooks = true

[agents]
max_threads = 4
max_depth = 1
job_max_runtime_seconds = 1800

services:
  backend:
    volumes:
      - type: bind
        source: ${GOOGLE_APPLICATION_CREDENTIALS:?Set GOOGLE_APPLICATION_CREDENTIALS to a local service account JSON file}
        target: /run/secrets/google-vision-credentials.json
        read_only: true
    environment:
      ALLOW_EXTERNAL_OCR: "true"
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/google-vision-credentials.json
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:?Set GOOGLE_CLOUD_PROJECT}
      GOOGLE_VISION_AUTH_MODE: adc

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: lemon_aid_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lemon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lemon1234}
      POSTGRES_DB: ${POSTGRES_DB:-lemon_aid}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lemon} -d ${POSTGRES_DB:-lemon_aid}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lemon_aid_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
